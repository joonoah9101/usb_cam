# [Camera Hardware Control Guide]
# 1. Values in this config file are written directly to the camera hardware
#    registers via v4l2 system calls (ioctl) when the node starts. (see usb_cam_node.cpp)
#
# 2. Value application logic:
#    - Integer: setting -1 keeps the hardware's current value; any value >= 0 is forced.
#    - Boolean: setting false switches to Manual mode and injects the related manual control value.
#
# 3. Recommended settings:
#    - When using autoexposure: false → keep exposure at or below 156 (prevents 30 FPS drop)
#    - exposure_dynamic_framerate: 0 recommended → prevents FPS drop caused by exposure length
#    - power_line_frequency: 2 recommended → 60 Hz (suppresses flicker for KR/US mains frequency)

# [카메라 하드웨어 제어 가이드]
# 1. 본 설정 파일의 수치는 노드 실행 시 v4l2 시스템 콜(ioctl)을 통해
#    카메라 하드웨어 레지스터에 직접 쓰여집니다. (usb_cam_node.cpp 참조)
#
# 2. 값 적용 로직:
#    - 정수형(int): -1로 설정 시 하드웨어의 현재 값을 유지하며, 0 이상의 값은 강제로 적용됨.
#    - 논리형(bool): false 설정 시 수동(Manual) 모드로 전환되며, 관련 수동 제어값이 주입됨.
#
# 3. 권장 설정:
#    - autoexposure: false 사용 시 → exposure 156 이하 유지 (30 FPS 드랍 방지)
#    - exposure_dynamic_framerate: 0 권장 → 노출 길이에 의한 FPS 드랍 방지
#    - power_line_frequency: 2 권장 → 60 Hz (한국/미국 전원 주파수 기준 플리커 억제)

camera2:
    ros__parameters:
      video_device: "/dev/v4l/by-id/usb-Global_Shutter_Camera_Global_Shutter_Camera_01.00.00-video-index0"
      framerate: 25.0
      io_method: "mmap"
      frame_id: "camera2"
      pixel_format: "yuyv"
      av_device_format: "YUV422P"
      image_width: 640
      image_height: 480
      camera_name: "global_s"
      camera_info_url: "package://usb_cam/config/camera2_info.yaml"

      # --- User Controls ---
      brightness: 50         # range: -64 to 64 (Default: 0)
      contrast: 0            # range: 0-95 (Default: 0)
      saturation: 56         # range: 0-255 (Default: 56)
      sharpness: 0           # range: 0-7 (Default: 0)
      gain: 0                # range: 0-1023 (Default: 0)

      # --- White Balance ---
      # true: white_balance_automatic=1, false: white_balance_automatic=0
      auto_white_balance: true
      white_balance: 4600    # range: 2800-6500 (Default: 4600)

      # --- Exposure ---
      # true: auto_exposure=3 (Aperture Priority), false: auto_exposure=1 (Manual)
      autoexposure: true
      exposure: 156          # range: 1-10000 (Default: 156)

      # --- Focus ---
      # true: focus_automatic_continuous=1, false: focus_automatic_continuous=0
      autofocus: false
      focus: 0               # range: 0-1023 (Default: 0)

      # --- Framerate & Flicker ---
      exposure_dynamic_framerate: -1   # 0=off (recommended), 1=on,    -1=leave alone
      power_line_frequency: 2         # 0=disabled, 1=50 Hz, 2=60 Hz, -1=leave alone